services:
  mudur:
    build:
      &build
      context: .
    expose:
      - 8080
    ports:
      - "8081:8080"
    depends_on:
      mudur-prerun:
        condition: service_completed_successfully
    env_file:
      &env_file
      - ./.env
    extra_hosts:
      &extra_hosts
      - "host.docker.internal:host-gateway"
    volumes:
      &volumes
      - ./entrypoint.sh:/usr/local/bin/entrypoint.sh  # For development purposes only!
      - ./kampyazilim.conf:/app/kampyazilim.conf  # For development purposes only!
      - ./mudur:/app/mudur  # For development purposes only!
      - django_static:/app/mudur/staticfiles
      - django_media:/app/mudur/media
      - django_spool_cron:/var/spool/cron
    restart: on-failure
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/curl",
          "--output",
          "/dev/null",
          "--silent",
          "--show-error",
          "--fail",
          "localhost:8080"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  mudur-prerun:
    build: *build
    env_file: *env_file
    extra_hosts: *extra_hosts
    volumes: *volumes
    entrypoint: [ "bash", "-c", "find /app/mudur/locale -name '*.mo' -delete && entrypoint.sh managepy compilemessages && entrypoint.sh managepy migrate && entrypoint.sh managepy collectstatic --noinput" ]

volumes:
  django_static:
  django_media:
  django_spool_cron:
